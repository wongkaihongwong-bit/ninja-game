<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>获取密钥 | Ninja Executor</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
        body{
            background:#0b0b13;
            color:#fff;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .box{
            background:#161625;
            padding:40px;
            border-radius:12px;
            border:1px solid #7b2cbf;
            width:100%;
            max-width:480px;
        }
        h2{color:#7b2cbf;margin-bottom:15px;}
        .tip{color:#aaa;margin-bottom:25px;}
        .keyArea{
            background:#0b0b13;
            padding:18px;
            border-radius:6px;
            border:1px solid #444;
            font-family:monospace;
            font-size:17px;
            color:#fff;
            margin:20px 0;
            word-break:break-all;
        }
        .time{color:#ffaa00;margin:10px 0;}
        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:6px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            margin:8px 0;
        }
        .getBtn{background:#7b2cbf;color:#fff;}
        .copyBtn{background:#222;color:#ddd;border:1px solid #555;}
        button:disabled{opacity:0.5;cursor:not-allowed;}
        a{color:#7b2cbf;text-decoration:none;display:inline-block;margin-top:20px;}
    </style>
</head>
<body>
    <div class="box">
        <h2>🔑 获取你的专属密钥</h2>
        <div class="tip">等待倒计时完成即可生成可用密钥</div>

        <div class="time" id="countText"></div>
        <div class="keyArea" id="keyShow">点击下方按钮生成密钥</div>

        <button class="getBtn" id="getBtn" onclick="createKey()">生成密钥</button>
        <button class="copyBtn" id="copyBtn" onclick="copyKey()" disabled>复制密钥</button>

        <br>
        <a href="index.html">← 返回首页</a>
    </div>

    <script>
        let nowKey = "";
        const strLib = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

        function randomStr(len){
            let res = "";
            for(let i=0;i<len;i++){
                res += strLib[Math.floor(Math.random()*strLib.length)];
            }
            return res;
        }

        function createKey(){
            let btn = document.getElementById("getBtn");
            let copyBtn = document.getElementById("copyBtn");
            let show = document.getElementById("keyShow");
            let timeTxt = document.getElementById("countText");

            btn.disabled = true;
            show.innerText = "正在准备密钥...";
            let t = 8;
            timeTxt.innerText = "请等待 " + t + " 秒";

            let timer = setInterval(()=>{
                t--;
                timeTxt.innerText = "请等待 " + t + " 秒";
                if(t <= 0){
                    clearInterval(timer);
                    timeTxt.innerText = "";
                    // 密钥格式：XXXX-XXXX-XXXX 跟Delta一样
                    nowKey = randomStr(4)+"-"+randomStr(4)+"-"+randomStr(4);
                    show.innerText = nowKey;
                    copyBtn.disabled = false;
                    btn.innerText = "已生成密钥";
                    // 本地保存密钥
                    localStorage.setItem("userKey",nowKey);
                }
            },1000);
        }

        function copyKey(){
            navigator.clipboard.writeText(nowKey).then(()=>{
                alert("✅ 密钥复制成功！\n去执行器页面粘贴使用");
            })
        }
    </script>
</body>
</html>

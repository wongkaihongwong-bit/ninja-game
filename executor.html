<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Executor - 执行器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#0b0b13;
            color:#fff;
            padding:25px;
            font-family:sans-serif;
        }
        .wrap{max-width:900px;margin:0 auto;}
        h1{color:#7b2cbf;margin-bottom:20px;}
        .keyBox{margin-bottom:15px;}
        input,textarea{
            width:100%;
            background:#161625;
            border:1px solid #444;
            color:#fff;
            padding:12px;
            border-radius:6px;
            font-size:15px;
        }
        textarea{height:220px;resize:none;margin:15px 0;}
        .log{
            background:#05050a;
            border:1px solid #333;
            padding:12px;
            height:160px;
            overflow:auto;
            font-family:monospace;
            color:#0f0;
        }
        button{
            padding:12px 30px;
            background:#7b2cbf;
            color:#fff;
            border:none;
            border-radius:6px;
            font-weight:bold;
            cursor:pointer;
            margin:10px 5px 0 0;
        }
        button:hover{background:#9d4edd;}
        a{color:#7b2cbf;}
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Ninja Roblox 执行器</h1>
        <div class="keyBox">
            <input type="text" id="keyInput" placeholder="请粘贴你的密钥...">
        </div>

        <textarea id="scriptArea" placeholder="只可以粘贴真实 Roblox Lua 脚本
(必须包含 loadstring / getgenv / game:GetService 等关键字)"></textarea>

        <button onclick="startInject()">▶ 执行脚本</button>
        <button onclick="clearLog()">清空日志</button>
        <br><br>
        <div class="log" id="logBox">系统就绪，请输入密钥并粘贴脚本...</div>

        <br>
        <a href="index.html">← 返回首页</a>
    </div>

    <script>
        // 自动读取上次保存的密钥
        window.onload = function(){
            let saveKey = localStorage.getItem("userKey");
            if(saveKey){
                document.getElementById("keyInput").value = saveKey;
            }
        }

        // 日志打印
        function addLog(txt){
            let log = document.getElementById("logBox");
            log.innerHTML += txt + "<br>";
            log.scrollTop = log.scrollHeight;
        }
        function clearLog(){
            document.getElementById("logBox").innerHTML = "日志已清空...";
        }

        // 密钥校验
        function checkKey(k){
            let reg = /^[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/;
            return reg.test(k);
        }

        // 脚本校验：只有真罗布乐思脚本才通过
        function checkScript(s){
            let rule = [
                /loadstring/i,
                /getgenv/i,
                /getfenv/i,
                /game:GetService/i,
                /_G\./i
            ];
            for(let r of rule){
                if(r.test(s)) return true;
            }
            return false;
        }

        // 主注入
        function startInject(){
            let k = document.getElementById("keyInput").value.trim();
            let s = document.getElementById("scriptArea").value.trim();

            if(!k){
                alert("请先填写密钥！\n去首页点【获取密钥】");
                return;
            }
            if(!checkKey(k)){
                alert("❌ 密钥无效！重新获取");
                addLog("[错误] 密钥格式错误");
                return;
            }
            if(!s){
                alert("请粘贴Roblox脚本！");
                return;
            }
            if(!checkScript(s)){
                alert("❌ 不是有效Roblox脚本！\n必须包含 loadstring / getgenv 等");
                addLog("[错误] 非法脚本，拒绝注入");
                return;
            }

            // 模拟注入动画
            addLog("[系统] 密钥验证通过");
            addLog("[系统] 正在检测Roblox进程...");
            setTimeout(()=>addLog("[系统] 绕过反注入保护..."),600);
            setTimeout(()=>addLog("[系统] 脚本注入中..."),1200);
            setTimeout(()=>addLog("[成功] 脚本运行完毕，游戏已生效！"),2000);
        }
    </script>
</body>
</html>

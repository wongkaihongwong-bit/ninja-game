<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninja Executor - 密钥 & 执行器</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#111;color:#fff;padding:20px;}
.container{max-width:800px;margin:0 auto;}
h1{color:#9d4edd;margin-bottom:20px;text-align:center;}
.box{background:#222;padding:15px;border-radius:8px;margin:10px 0;}
input,textarea{width:100%;padding:10px;background:#333;border:none;color:#fff;border-radius:4px;margin:8px 0;}
button{padding:10px 20px;background:#9d4edd;border:none;color:#fff;border-radius:4px;cursor:pointer;margin:5px;}
button:disabled{background:#555;cursor:not-allowed;opacity:0.6;}
.log{background:#000;padding:10px;height:150px;overflow:auto;color:#0f0;}
.link-btn{background:#ff0000;display:inline-block;padding:8px 16px;border-radius:4px;color:#fff;text-decoration:none;margin:4px;}
.ins-btn{background:#bc2a8d;}
.fb-btn{background:#1877f2;}
.count-text{color:#ffaa00;margin:8px 0;}
.step-done{color:#00ff00;}
.step-undone{color:#999;}
</style>
</head>
<body>
<div class="container">
    <h1>NINJA EXECUTOR 🔐</h1>

    <!-- 社交关注任务区域 -->
    <div class="box">
        <h3>📱 完成关注任务解锁密钥</h3>
        <div>
            <a class="link-btn" id="ytBtn" target="_blank" href="https://www.youtube.com/@%E9%BB%91%E5%AE%A2%E5%AE%9E%E5%90%8D%E8%AE%A4%E8%AF%81">YouTube 订阅</a>
            <span id="ytStep" class="step-undone">未完成 (需等待60秒)</span>
        </div>
        <div class="count-text" id="ytCount"></div>

        <div style="margin:10px 0;">
            <a class="link-btn ins-btn" id="igBtn" target="_blank" href="https://www.instagram.com/xx9952026?igsh=MmVobHkxdzlwb293">Instagram 关注</a>
            <span id="igStep" class="step-undone">未完成 (需等待60秒)</span>
        </div>
        <div class="count-text" id="igCount"></div>

        <div>
            <a class="link-btn fb-btn" id="fbBtn" target="_blank" href="https://www.facebook.com/share/1C95LqTZ1L/">Facebook 关注</a>
            <span id="fbStep" class="step-undone">未完成 (需等待60秒)</span>
        </div>
        <div class="count-text" id="fbCount"></div>
    </div>

    <!-- 1. 获取密钥区域 -->
    <div class="box">
        <h3>🔑 在线获取密钥</h3>
        <div id="timeText"></div>
        <input id="keyShow" readonly placeholder="密钥会显示在这里">
        <button id="getBtn" onclick="makeKey()">生成密钥</button>
        <button id="copyBtn" onclick="copyKey()" disabled>复制密钥</button>
    </div>

    <!-- 2. 密钥验证 + 执行器 -->
    <div class="box">
        <h3>✅ 密钥验证 & 脚本执行</h3>
        <input id="userKey" placeholder="粘贴你获取到的密钥...">
        <textarea id="scriptInput" placeholder="只能粘贴真实Roblox完整脚本，乱写无法通过识别！"></textarea>
        <button onclick="runInject()">开始执行</button>
        <button onclick="clearLog()">清空日志</button>
    </div>

    <!-- 3. 运行日志 -->
    <div class="box">
        <div class="log" id="log"></div>
    </div>
</div>

<script>
let nowKey = "";
const wordLib = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

// 任务状态
let ytDone = false, igDone = false, fbDone = false;
let ytTimer = null, igTimer = null, fbTimer = null;

// 随机密钥
function randStr(n){
    let s = "";
    for(let i=0;i<n;i++) s += wordLib[Math.floor(Math.random()*wordLib.length)];
    return s;
}

// 检测全部任务是否完成
function checkAllTask(){
    let getBtn = document.getElementById("getBtn");
    if(ytDone && igDone && fbDone){
        getBtn.disabled = false;
    }else{
        getBtn.disabled = true;
    }
}

// YouTube 60秒倒计时
document.getElementById("ytBtn").addEventListener("click",function(){
    if(ytDone) return;
    let sec = 60;
    let dom = document.getElementById("ytCount");
    let stepDom = document.getElementById("ytStep");
    dom.innerText = "YouTube 倒计时："+sec+" 秒";

    ytTimer = setInterval(()=>{
        sec--;
        dom.innerText = "YouTube 倒计时："+sec+" 秒";
        if(sec <= 0){
            clearInterval(ytTimer);
            dom.innerText = "YouTube 任务完成！";
            stepDom.className = "step-done";
            stepDom.innerText = "✅ 已完成";
            ytDone = true;
            checkAllTask();
        }
    },1000);
});

// Instagram 60秒倒计时
document.getElementById("igBtn").addEventListener("click",function(){
    if(igDone) return;
    let sec = 60;
    let dom = document.getElementById("igCount");
    let stepDom = document.getElementById("igStep");
    dom.innerText = "Instagram 倒计时："+sec+" 秒";

    igTimer = setInterval(()=>{
        sec--;
        dom.innerText = "Instagram 倒计时："+sec+" 秒";
        if(sec <= 0){
            clearInterval(igTimer);
            dom.innerText = "Instagram 任务完成！";
            stepDom.className = "step-done";
            stepDom.innerText = "✅ 已完成";
            igDone = true;
            checkAllTask();
        }
    },1000);
});

// Facebook 60秒倒计时
document.getElementById("fbBtn").addEventListener("click",function(){
    if(fbDone) return;
    let sec = 60;
    let dom = document.getElementById("fbCount");
    let stepDom = document.getElementById("fbStep");
    dom.innerText = "Facebook 倒计时："+sec+" 秒";

    fbTimer = setInterval(()=>{
        sec--;
        dom.innerText = "Facebook 倒计时："+sec+" 秒";
        if(sec <= 0){
            clearInterval(fbTimer);
            dom.innerText = "Facebook 任务完成！";
            stepDom.className = "step-done";
            stepDom.innerText = "✅ 已完成";
            fbDone = true;
            checkAllTask();
        }
    },1000);
});

// 生成密钥倒计时
function makeKey(){
    let btn = document.getElementById("getBtn");
    let copyBtn = document.getElementById("copyBtn");
    let show = document.getElementById("keyShow");
    let tTxt = document.getElementById("timeText");

    btn.disabled = true;
    let t = 6;
    tTxt.innerText = "等待："+t+"秒";
    let timer = setInterval(()=>{
        t--;
        tTxt.innerText = "等待："+t+"秒";
        if(t<=0){
            clearInterval(timer);
            nowKey = randStr(4)+"-"+randStr(4)+"-"+randStr(4);
            show.value = nowKey;
            copyBtn.disabled = false;
            tTxt.innerText = "密钥生成成功！";
            localStorage.setItem("saveKey",nowKey);
        }
    },1000);
}

// 复制密钥
function copyKey(){
    navigator.clipboard.writeText(nowKey);
    alert("✅ 密钥已复制！去下面粘贴验证");
}

// 页面自动回填上次密钥
window.onload = function(){
    let old = localStorage.getItem("saveKey");
    if(old) document.getElementById("userKey").value = old;
    // 初始禁用生成密钥按钮
    document.getElementById("getBtn").disabled = true;
}

// 日志
function addLog(text){
    let log = document.getElementById("log");
    log.innerHTML += text+"<br>";
    log.scrollTop = log.scrollHeight;
}
function clearLog(){
    document.getElementById("log").innerHTML = "日志已清空...";
}

// 密钥格式判断
function checkKey(k){
    let reg = /^[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/;
    return reg.test(k);
}

// ========== 超强真假脚本识别（已帮你完整写好） ==========
function checkScript(s){
    // 必须含有罗布乐思核心关键字
    let coreKeys = [
        /loadstring\(/i,
        /getgenv\(/i,
        /game:GetService\(/i,
        /_G\./i,
        /game\.Players/i,
        /game\.Workspace/i
    ];

    let hasCore = false;
    for(let r of coreKeys){
        if(r.test(s)){
            hasCore = true;
            break;
        }
    }
    if(!hasCore) return false;

    // 必须有完整结构，防止只打关键词混过去
    let fullStruct = [
        /httpget/i,
        /\(\s*\)/,
        /\.\w+\./,
        /"\w+"/
    ];

    let hasFull = false;
    for(let r of fullStruct){
        if(r.test(s)){
            hasFull = true;
            break;
        }
    }

    return hasFull;
}
// =====================================================

// 主运行
function runInject(){
    let k = document.getElementById("userKey").value.trim();
    let s = document.getElementById("scriptInput").value.trim();

    if(!k){
        alert("请先获取并填写密钥！");
        addLog("[错误] 未填写密钥");
        return;
    }
    if(!checkKey(k)){
        alert("密钥错误！重新生成");
        addLog("[错误] 密钥无效");
        return;
    }
    if(!s){
        alert("请粘贴Roblox脚本！");
        return;
    }
    if(!checkScript(s)){
        alert("❌ 识别失败：不是真实完整Roblox脚本！");
        addLog("[错误] 假脚本/不完整脚本已拦截");
        return;
    }

    addLog("[成功] 密钥验证通过");
    setTimeout(()=>addLog("[系统] 正在检测Roblox进程..."),500);
    setTimeout(()=>addLog("[系统] 绕过反注入保护..."),1000);
    setTimeout(()=>addLog("[系统] 脚本注入中..."),1500);
    setTimeout(()=>addLog("[成功] 脚本执行完成！"),2200);
}
</script>
</body>
</html>

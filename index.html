<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninja Executor - 密钥 & 执行器</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#111;color:#fff;padding:20px;}
.container{max-width:800px;margin:0 auto;}
h1{color:#9d4edd;margin-bottom:20px;}
.box{background:#222;padding:15px;border-radius:8px;margin:10px 0;}
input,textarea{width:100%;padding:10px;background:#333;border:none;color:#fff;border-radius:4px;margin:8px 0;}
button{padding:10px 20px;background:#9d4edd;border:none;color:#fff;border-radius:4px;cursor:pointer;margin:5px;}
button:disabled{background:#555;cursor:not-allowed;}
.log{background:#000;padding:10px;height:150px;overflow:auto;color:#0f0;}
</style>
</head>
<body>
<div class="container">
    <h1>NINJA EXECUTOR 🔐</h1>

    <!-- 1. 获取密钥区域 -->
    <div class="box">
        <h3>🔑 在线获取密钥</h3>
        <div id="timeText"></div>
        <input id="keyShow" readonly placeholder="密钥会显示在这里">
        <button id="getBtn" onclick="makeKey()">生成密钥</button>
        <button id="copyBtn" onclick="copyKey()" disabled>复制密钥</button>
    </div>

    <!-- 2. 密钥验证 + 执行器 -->
    <div class="box">
        <h3>✅ 密钥验证 & 脚本执行</h3>
        <input id="userKey" placeholder="粘贴你获取到的密钥...">
        <textarea id="scriptInput" placeholder="只能粘贴真实Roblox脚本：loadstring / getgenv 这类才允许执行"></textarea>
        <button onclick="runInject()">开始执行</button>
        <button onclick="clearLog()">清空日志</button>
    </div>

    <!-- 3. 运行日志 -->
    <div class="box">
        <div class="log" id="log"></div>
    </div>
</div>

<script>
let nowKey = "";
const wordLib = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

// 随机密钥
function randStr(n){
    let s = "";
    for(let i=0;i<n;i++) s += wordLib[Math.floor(Math.random()*wordLib.length)];
    return s;
}

// 生成密钥倒计时
function makeKey(){
    let btn = document.getElementById("getBtn");
    let copyBtn = document.getElementById("copyBtn");
    let show = document.getElementById("keyShow");
    let tTxt = document.getElementById("timeText");

    btn.disabled = true;
    let t = 6;
    tTxt.innerText = "等待："+t+"秒";
    let timer = setInterval(()=>{
        t--;
        tTxt.innerText = "等待："+t+"秒";
        if(t<=0){
            clearInterval(timer);
            nowKey = randStr(4)+"-"+randStr(4)+"-"+randStr(4);
            show.value = nowKey;
            copyBtn.disabled = false;
            tTxt.innerText = "密钥生成成功！";
            localStorage.setItem("saveKey",nowKey);
        }
    },1000);
}

// 复制密钥
function copyKey(){
    navigator.clipboard.writeText(nowKey);
    alert("✅ 密钥已复制！去下面粘贴验证");
}

// 页面自动回填上次密钥
window.onload = function(){
    let old = localStorage.getItem("saveKey");
    if(old) document.getElementById("userKey").value = old;
}

// 日志
function addLog(text){
    let log = document.getElementById("log");
    log.innerHTML += text+"<br>";
    log.scrollTop = log.scrollHeight;
}
function clearLog(){
    document.getElementById("log").innerHTML = "日志已清空...";
}

// 密钥格式判断
function checkKey(k){
    let reg = /^[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/;
    return reg.test(k);
}

// 判断是不是真Roblox脚本
function checkScript(s){
    let ok = [/loadstring/i,/getgenv/i,/game:GetService/i,/_G\./i];
    for(let x of ok) if(x.test(s)) return true;
    return false;
}

// 主运行
function runInject(){
    let k = document.getElementById("userKey").value.trim();
    let s = document.getElementById("scriptInput").value.trim();

    if(!k){
        alert("请先获取并填写密钥！");
        addLog("[错误] 未填写密钥");
        return;
    }
    if(!checkKey(k)){
        alert("密钥错误！重新生成");
        addLog("[错误] 密钥无效");
        return;
    }
    if(!s){
        alert("请粘贴Roblox脚本！");
        return;
    }
    if(!checkScript(s)){
        alert("不是真实Roblox脚本，禁止运行！");
        addLog("[错误] 非法脚本拦截");
        return;
    }

    addLog("[成功] 密钥验证通过");
    setTimeout(()=>addLog("[系统] 正在检测Roblox进程..."),500);
    setTimeout(()=>addLog("[系统] 绕过反注入保护..."),1000);
    setTimeout(()=>addLog("[系统] 脚本注入中..."),1500);
    setTimeout(()=>addLog("[成功] 脚本执行完成！"),2200);
}
</script>
</body>
</html>
